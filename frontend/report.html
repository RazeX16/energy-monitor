<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Historical Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #cbd5e0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .inputs {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        input, button {
            padding: 8px;
            font-size: 14px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Historical Energy Report</h2>

    <div class="inputs">
        <label>Start Date:</label>
        <input type="date" id="startDate">

        <label>End Date:</label>
        <input type="date" id="endDate">

        <button onclick="loadReport()">Generate Report</button>
    </div>

    <table id="reportTable">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Generation</th>
                <th>Schedule</th>
                <th>Frequency</th>
                <th>Deviation</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
async function loadReport() {
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    if (!start || !end) {
        alert("Please select both dates");
        return;
    }

    const response = await fetch(
        `http://127.0.0.1:8000/historical?start_date=${start}&end_date=${end}`
    );

    const data = await response.json();

    const tableBody = document.querySelector("#reportTable tbody");
    tableBody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.timestamp}</td>
            <td>${row.generation}</td>
            <td>${row.schedule}</td>
            <td>${row.frequency}</td>
            <td>${row.deviation}</td>
        `;

        tableBody.appendChild(tr);
    });
}
</script>

</body>
</html>
