<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Dashboard</title>
  <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        padding: 0;

        background-size: cover;

        color: white;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    /* 🌌 Animated overlay */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
        background-size: 600% 600%;
        opacity: 0.85;
        animation: moveBg 12s ease infinite;
        z-index: 0;
    }

    @keyframes moveBg {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        position: relative;
        z-index: 1;
        width: 90%;
        max-width: 1000px;
        margin: 40px auto;
        text-align: center;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 36px;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(0,255,255,0.7);
    }

    .dashboard {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
    }

    .card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 30px;
        border-radius: 18px;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 20px rgba(0,255,255,0.2);
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 35px rgba(0,255,255,0.5);
    }

    .card h2 {
        margin-bottom: 15px;
        font-size: 20px;
        color: #ddd;
    }

    .value {
        font-size: 42px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    /* ⚡ Glow Colors */
    #frequency { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    #generation { color: #00b0ff; text-shadow: 0 0 10px #00b0ff; }
    #schedule { color: #ffd740; text-shadow: 0 0 10px #ffd740; }
    #deviation { color: #ff5252; text-shadow: 0 0 10px #ff5252; }

    .footer {
        margin-top: 25px;
        font-size: 14px;
        color: #ccc;
    }

    .error {
        margin-top: 12px;
        color: #ff5252;
    }

    @media (max-width: 700px) {
        .dashboard {
            grid-template-columns: 1fr;
        }

        h1 {
            font-size: 28px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>Realtime Power Dashboard</h1>

    <div class="dashboard">
        <div class="card">
            <h2>Frequency</h2>
            <div class="value" id="frequency">--</div>
        </div>

        <div class="card">
            <h2>Generation</h2>
            <div class="value" id="generation">--</div>
        </div>

        <div class="card">
            <h2>Schedule</h2>
            <div class="value" id="schedule">--</div>
        </div>

        <div class="card">
            <h2>Deviation</h2>
            <div class="value" id="deviation">--</div>
        </div>
    </div>

    <div class="footer">
        Last updated: <span id="lastUpdated">--</span>
    </div>

    <div class="error" id="errorMsg"></div>
</div>

<script>
    async function fetchRealtimeData() {
        try {
            const response = await fetch("http://127.0.0.1:8000/realtime?t=" + new Date().getTime());

            if (!response.ok) {
                throw new Error("API error: " + response.status);
            }

            const data = await response.json();

            document.getElementById("frequency").innerText = data.frequency ?? "--";
            document.getElementById("generation").innerText = data.generation ?? "--";
            document.getElementById("schedule").innerText = data.schedule ?? "--";
            document.getElementById("deviation").innerText = data.deviation ?? "--";

            document.getElementById("lastUpdated").innerText = new Date().toLocaleTimeString();
            document.getElementById("errorMsg").innerText = "";

            const freqElement = document.getElementById("frequency");
            if (data.frequency !== null && data.frequency !== undefined && Number(data.frequency) < 49.5) {
                freqElement.style.color = "#ff5252";
            } else {
                freqElement.style.color = "#00e676";
            }

        } catch (error) {
            console.error("Error:", error);
            document.getElementById("errorMsg").innerText = "Unable to load realtime data";
        }
    }

    fetchRealtimeData();
    setInterval(fetchRealtimeData, 5000);
</script>

</body>
</html>
